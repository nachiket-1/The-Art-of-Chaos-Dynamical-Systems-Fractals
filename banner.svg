<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#080b14"/>
      <stop offset="30%"  stop-color="#0f1729"/>
      <stop offset="60%"  stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7eb8f7"/>
      <stop offset="50%"  stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#67e8c0"/>
    </linearGradient>
    <linearGradient id="glowLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#a78bfa" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glowRight" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%"  stop-color="#67e8c0" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#67e8c0" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
    <clipPath id="rounded">
      <rect width="900" height="220" rx="14" ry="14"/>
    </clipPath>
  </defs>

  <!-- Base dark background -->
  <rect width="900" height="220" fill="url(#bg)" rx="14" ry="14"/>

  <!-- Ambient glow blobs -->
  <ellipse cx="180" cy="110" rx="220" ry="120" fill="url(#glowLeft)" filter="url(#blur2)" clip-path="url(#rounded)"/>
  <ellipse cx="720" cy="110" rx="220" ry="120" fill="url(#glowRight)" filter="url(#blur2)" clip-path="url(#rounded)"/>

  <!-- Subtle grid lines -->
  <g clip-path="url(#rounded)" opacity="0.04" stroke="#a78bfa" stroke-width="0.5">
    <line x1="0" y1="44" x2="900" y2="44"/>
    <line x1="0" y1="88" x2="900" y2="88"/>
    <line x1="0" y1="132" x2="900" y2="132"/>
    <line x1="0" y1="176" x2="900" y2="176"/>
    <line x1="150" y1="0" x2="150" y2="220"/>
    <line x1="300" y1="0" x2="300" y2="220"/>
    <line x1="450" y1="0" x2="450" y2="220"/>
    <line x1="600" y1="0" x2="600" y2="220"/>
    <line x1="750" y1="0" x2="750" y2="220"/>
  </g>

  <!-- Waving bottom shape -->
  <path d="M0,155 C120,135 240,175 360,155 C480,135 600,175 720,155 C810,140 870,158 900,152 L900,220 L0,220 Z"
        fill="#0f1729" opacity="0.6" clip-path="url(#rounded)"/>
  <path d="M0,170 C100,155 220,188 360,168 C500,148 640,185 780,165 C840,158 880,170 900,166 L900,220 L0,220 Z"
        fill="#080b14" opacity="0.5" clip-path="url(#rounded)"/>

  <!-- Decorative corner dots -->
  <circle cx="32" cy="32" r="2" fill="#7eb8f7" opacity="0.4"/>
  <circle cx="44" cy="32" r="1.2" fill="#a78bfa" opacity="0.3"/>
  <circle cx="32" cy="44" r="1.2" fill="#67e8c0" opacity="0.3"/>
  <circle cx="868" cy="32" r="2" fill="#7eb8f7" opacity="0.4"/>
  <circle cx="856" cy="32" r="1.2" fill="#a78bfa" opacity="0.3"/>
  <circle cx="868" cy="44" r="1.2" fill="#67e8c0" opacity="0.3"/>

  <!-- Small decorative dots scattered -->
  <circle cx="80"  cy="60"  r="1" fill="#7eb8f7" opacity="0.25"/>
  <circle cx="820" cy="60"  r="1" fill="#67e8c0" opacity="0.25"/>
  <circle cx="60"  cy="150" r="1" fill="#a78bfa" opacity="0.2"/>
  <circle cx="840" cy="145" r="1" fill="#f7c873" opacity="0.2"/>
  <circle cx="200" cy="30"  r="0.8" fill="#7eb8f7" opacity="0.2"/>
  <circle cx="700" cy="30"  r="0.8" fill="#67e8c0" opacity="0.2"/>

  <!-- Main title with gradient via clip trick -->
  <defs>
    <linearGradient id="tg2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7eb8f7"/>
      <stop offset="50%"  stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#67e8c0"/>
    </linearGradient>
  </defs>
  <text x="450" y="102"
        text-anchor="middle"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="62"
        font-weight="900"
        letter-spacing="-1.5"
        fill="url(#tg2)">The Art of Chaos</text>

  <!-- Thin accent line under title -->
  <line x1="280" y1="116" x2="620" y2="116" stroke="url(#tg2)" stroke-width="1" opacity="0.3"/>

  <!-- Subtitle -->
  <text x="450" y="145"
        text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="13"
        letter-spacing="3.5"
        fill="#5a7a9a">A VISUAL JOURNEY THROUGH DYNAMICAL SYSTEMS &amp; FRACTALS</text>
</svg>
